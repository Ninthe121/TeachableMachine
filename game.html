<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>007 TM Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>

    <header>
        <h1>0 0 7</h1>
    </header>

    <div class="countdown-indicators">
        <span class="indicator" id="ind-0"></span>
         <span class="indicator" id="ind-1"></span>
         <span class="indicator" id="ind-2"></span>
    </div>

    <section class="pose-game"></section>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="game.html">Game</a></li>
            <li><a href="win.html">Win</a></li>
            <li><a href="lose.html">Lose</a></li>
        </ul>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script src="pose.js"></script>
    <script>
        function handlePose(pose) {
            if (pose === "Reload") {
             reloadWeapon(); 
            } else if (pose === "Shield") {
                activateShield(); 
            } else if (pose === "Shoot") {
                shoot(); 
            }
        }
        
        window.onload = () => {
            initPose();
            startTimer();
            startRound();
        };
    </script>
</body>
</html>
